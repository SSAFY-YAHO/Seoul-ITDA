services:
  - type: web
    name: seoul-itda-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./backend/localhub.db
      - key: SEOUL_DATA_PATH
        value: data
      - key: CHAT_AI_PROVIDER
        value: openai
      - key: CHAT_WEB_SEARCH_ENABLED
        value: true
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_WEB_SEARCH_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_WEB_SEARCH_TIMEOUT_SEC
        value: 30
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
