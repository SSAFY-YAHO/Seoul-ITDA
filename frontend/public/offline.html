<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#315f4a" />
    <title>서울잇다 | 오프라인</title>
    <style>
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: #f7f7ef; color: #315f4a; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(100%, 460px); padding: 42px 30px; border: 1px solid #cfddcd; border-radius: 28px; background: #fffdf7; box-shadow: 0 18px 42px rgba(49, 95, 74, 0.12); text-align: center; }
      img { width: 112px; height: 112px; border-radius: 26px; }
      h1 { margin: 22px 0 10px; font-size: 1.65rem; }
      p { margin: 0; color: #64766c; line-height: 1.7; }
      button { margin-top: 24px; padding: 12px 20px; border: 0; border-radius: 999px; background: #3f765a; color: white; font: inherit; font-weight: 800; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="서울잇다" />
      <h1>잠시 길을 잃었어요</h1>
      <p>인터넷 연결을 확인한 뒤 다시 시도해 주세요.<br />이미 둘러본 화면은 오프라인에서도 열릴 수 있어요.</p>
      <button type="button" onclick="window.location.reload()">다시 연결하기</button>
    </main>
  </body>
</html>
